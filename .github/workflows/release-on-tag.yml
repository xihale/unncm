name: Release On Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target tag and release status
        id: precheck
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag=$(git tag --list "v*" --sort=-v:refname | head -n 1)
          fi

          if [[ -z "${tag}" ]]; then
            echo "No v* tag found, skip build."
            echo "should_build=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta|rc|release)\.[0-9]+)?$ ]]; then
            echo "Invalid tag: ${tag}"
            echo "Expected format: vMAJ.MIN.PATCH or vMAJ.MIN.PATCH-(alpha|beta|rc|release).N"
            exit 1
          fi

          if [[ "${tag}" =~ -(alpha|beta|rc)\.[0-9]+$ ]]; then
            echo "is_prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

          release_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${tag}"
          http_code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${release_api}")

          case "${http_code}" in
            200)
              echo "Release already exists for ${tag}, skip build."
              echo "should_build=false" >> "${GITHUB_OUTPUT}"
              ;;
            404)
              echo "No release found for ${tag}, continue build."
              echo "should_build=true" >> "${GITHUB_OUTPUT}"
              ;;
            *)
              echo "Failed to check release status for ${tag}, HTTP ${http_code}"
              exit 1
              ;;
          esac

          echo "target_tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Skip message
        if: steps.precheck.outputs.should_build != 'true'
        run: |
          echo "Skip: release already exists or no valid tag found."

      - name: Checkout target tag
        if: steps.precheck.outputs.should_build == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.precheck.outputs.target_tag }}

      - name: Setup Java
        if: steps.precheck.outputs.should_build == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        if: steps.precheck.outputs.should_build == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Ensure Gradle wrapper jar exists
        if: steps.precheck.outputs.should_build == 'true'
        run: |
          if [[ ! -f "gradle/wrapper/gradle-wrapper.jar" ]]; then
            echo "gradle-wrapper.jar missing in target tag, bootstrapping with installed Gradle..."
            gradle --no-daemon wrapper
          fi

      - name: Validate signing secrets
        if: steps.precheck.outputs.should_build == 'true'
        env:
          RELEASE_STORE_FILE_BASE64: ${{ secrets.UNNCM_RELEASE_STORE_FILE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.UNNCM_RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.UNNCM_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.UNNCM_RELEASE_KEY_PASSWORD }}
        run: |
          if [[ -z "${RELEASE_STORE_FILE_BASE64}" ]]; then
            echo "Missing secret: UNNCM_RELEASE_STORE_FILE_BASE64"
            exit 1
          fi
          if [[ -z "${RELEASE_STORE_PASSWORD}" ]]; then
            echo "Missing secret: UNNCM_RELEASE_STORE_PASSWORD"
            exit 1
          fi
          if [[ -z "${RELEASE_KEY_ALIAS}" ]]; then
            echo "Missing secret: UNNCM_RELEASE_KEY_ALIAS"
            exit 1
          fi
          if [[ -z "${RELEASE_KEY_PASSWORD}" ]]; then
            echo "Missing secret: UNNCM_RELEASE_KEY_PASSWORD"
            exit 1
          fi

      - name: Restore signing keystore
        if: steps.precheck.outputs.should_build == 'true'
        env:
          RELEASE_STORE_FILE_BASE64: ${{ secrets.UNNCM_RELEASE_STORE_FILE_BASE64 }}
        run: |
          keystore_path="${RUNNER_TEMP}/unncm.jks"
          printf '%s' "${RELEASE_STORE_FILE_BASE64}" | base64 --decode > "${keystore_path}"
          echo "UNNCM_RELEASE_STORE_FILE=${keystore_path}" >> "${GITHUB_ENV}"

      - name: Build ABI split release APK
        if: steps.precheck.outputs.should_build == 'true'
        env:
          UNNCM_RELEASE_STORE_PASSWORD: ${{ secrets.UNNCM_RELEASE_STORE_PASSWORD }}
          UNNCM_RELEASE_KEY_ALIAS: ${{ secrets.UNNCM_RELEASE_KEY_ALIAS }}
          UNNCM_RELEASE_KEY_PASSWORD: ${{ secrets.UNNCM_RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon clean :app:assembleRelease

      - name: Prepare renamed release assets
        if: steps.precheck.outputs.should_build == 'true'
        id: assets
        run: |
          tag="${{ steps.precheck.outputs.target_tag }}"
          out_dir="app/build/outputs/apk/release"
          asset_dir="${RUNNER_TEMP}/release-assets"
          mkdir -p "${asset_dir}"

          v7a_src=$(find "${out_dir}" -maxdepth 1 -type f -name "*armeabi-v7a-release*.apk" | head -n 1)
          v8a_src=$(find "${out_dir}" -maxdepth 1 -type f -name "*arm64-v8a-release*.apk" | head -n 1)

          if [[ -z "${v7a_src}" ]]; then
            echo "Missing armeabi-v7a release apk"
            exit 1
          fi

          if [[ -z "${v8a_src}" ]]; then
            echo "Missing arm64-v8a release apk"
            exit 1
          fi

          v7a_dst="${asset_dir}/unncm-${tag}-armeabi-v7a.apk"
          v8a_dst="${asset_dir}/unncm-${tag}-arm64-v8a.apk"

          cp "${v7a_src}" "${v7a_dst}"
          cp "${v8a_src}" "${v8a_dst}"

          ls -lah "${asset_dir}"

          echo "asset_dir=${asset_dir}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        if: steps.precheck.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.precheck.outputs.target_tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ steps.precheck.outputs.is_prerelease }}
          files: |
            ${{ steps.assets.outputs.asset_dir }}/unncm-${{ steps.precheck.outputs.target_tag }}-armeabi-v7a.apk
            ${{ steps.assets.outputs.asset_dir }}/unncm-${{ steps.precheck.outputs.target_tag }}-arm64-v8a.apk
